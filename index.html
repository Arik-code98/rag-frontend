<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RAG Chat</title>
</head>
<body>
    <h1>Chat with your document</h1>
 
    <!-- Register section -->
    <input type="text" id="regUsernameInput" placeholder="Username">
    <input type="password" id="regPasswordInput" placeholder="Password">
    <button onclick="register()">Register</button>
    <p id="registerStatus"></p>
    
    <!-- Login section -->
    <input type="text" id="usernameInput" placeholder="Username">
    <input type="password" id="passwordInput" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="loginStatus"></p>
    
    <!-- Upload section -->
    <input type="file" id="fileInput" accept=".txt">
    <button onclick="uploadFile()">Upload</button>
    <p id="uploadStatus"></p>

    <!-- Chat section -->
    <input type="text" id="questionInput" placeholder="Ask a question...">
    <button onclick="askQuestion()">Ask</button>
    <p id="answer"></p>
    
    <script>
        let collectionId = null;

        let authToken = null;

        async function register() {
            const username = document.getElementById("regUsernameInput").value
            const password = document.getElementById("regPasswordInput").value
            const response = await fetch("http://localhost:8000/register", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({username: username, password: password})
            })
            const data = await response.json()
            if (response.ok) {
                document.getElementById("registerStatus").textContent = "Registered! Now login."
            } else {
                document.getElementById("registerStatus").textContent = "Registration failed."
            }
        }
        
        async function login() {
            const username = document.getElementById("usernameInput").value
            const password = document.getElementById("passwordInput").value
            const formData = new FormData()
            formData.append("username", username)
            formData.append("password", password)
            const response = await fetch("http://localhost:8000/login", {
                method: "POST",
                body: formData
            })
            const data = await response.json()
            if (data.access_token) {
                authToken = data.access_token
                document.getElementById("loginStatus").textContent = "Logged in!"
            } else {
                document.getElementById("loginStatus").textContent = "Login failed. Check credentials."
            }
        }
        
        async function uploadFile() {
            const file = document.getElementById("fileInput").files[0]
            const formData = new FormData()
            formData.append("document", file)
            const response = await fetch("http://localhost:8000/upload", {
                headers: {"Authorization": "Bearer " + authToken},
                method: "POST",
                body: formData
            });
            const data = await response.json();
            collectionId = data.collection_id
            document.getElementById("uploadStatus").textContent = "Uploaded! ID: " + collectionId
        }

        async function askQuestion() {
            const question = document.getElementById("questionInput").value
            const response = await fetch("http://localhost:8000/ask", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + authToken
                },
                body: JSON.stringify({collection_id: collectionId, question: question})
            })
            const data = await response.json()
            document.getElementById("answer").textContent = data.answer
        }
    </script>
</body>
</html>
